theme = "transparent"

[editor]
default-yank-register = "+"
middle-click-paste = false
line-number = "relative"
text-width = 100

[editor.auto-save]
focus-lost = true
after-delay.enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true
wrap-at-text-width = true

[keys.normal]
"space" = { "space" = "goto_last_accessed_file" }
"%" = "select_all"
