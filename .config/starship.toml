# ln ~/.config/starship.toml
format = """\
[в•ӯв•ҙ](fg:arrow)\
$username\
$os\
$hostname\
$directory\
(\
    $git_branch\
    $git_status\
)\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""
# Add the modules you need

# Disables the blank line at the start of the prompt
add_newline = true

palette = "adwaita-dark"

[palettes.adwaita-dark]
arrow = "#bac2de"
error = "#f38ba8"
user = "#89b4fa"
root = "#f38ba8"
os = "#cdd6f4"
directory = "#cba6f7"
time = "#FFDC72"
git = "#f9e2af"
git_status = "#94e2d5"
duration = "#74c7ec"
text_color = "#11111b"

[os]
format = "[оӮ¶](fg:os)[$symbol]($style)"
style = "bg:os fg:text_color"
disabled = false

[hostname]
ssh_only = false
format = "[$hostname]($style)оӮҙ"
style = "bg:os fg:text_color"
disabled = false

[username]
style_user = 'user'
style_root = 'root'
format = '[оӮ¶]($style)[оҙө $user](bg:$style fg:text_color)[оӮҙ]($style) '
disabled = false
show_always = true

[character]
success_symbol = "[оҳӮ](fg:arrow)"
error_symbol = "[оҳӮ](fg:error)"
vimcmd_symbol = "[оҳ«](fg:arrow)"

[directory]
format = " [оӮ¶](fg:directory)[пҒј  $path]($style)[$read_only]($read_only_style)[оӮҙ](fg:directory)"
truncation_length = 2
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
read_only = " о©ө "
truncate_to_repo = true
truncation_symbol = "вҖҰ/"

[time]
disabled = true
format = " [оӮ¶](fg:time)[пҖ— $time]($style)[оӮҙ](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

[cmd_duration]
format = " [оӮ¶](fg:duration)[пү” $duration]($style)[оӮҙ](fg:duration)"
style = "fg:text_color bg:duration"
min_time = 5000

[git_branch]
format = " [оӮ¶](fg:git)[$symbol$branch](fg:text_color bg:git)[оӮҙ](fg:git)"
symbol = "пҗҳ "

[git_status]
format = '([ оӮ¶](fg:git_status)[ $all_status$ahead_behind ]($style)[оӮҙ](fg:git_status))'
style = "fg:text_color bg:git_status"

[os.symbols]
Alpine = "пҢҖ "
AlmaLinux = "пҢқ "
