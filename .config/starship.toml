format = """\
[в•ӯв•ҙ](fg:arrow)\
$os\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $conda\
    $nodejs\
)\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""
# Add the modules you need

# Disables the blank line at the start of the prompt
add_newline = true

palette = "adwaita-dark"

 
[palettes.adwaita-dark]
arrow = "white"
os = "#FFFFFF"
os_admin = "#FFFFFF"
directory = "#c061cb"
time = "#FFDC72"
git = "#f5c211"
git_status = "#72FFD5"
clang = "#67E3FF"
java = "#FF52A3"
python = "#B4F9F8"
node = "#81FF85"
conda = "#BAF5C0"
duration = "#91FFE7"
text_color = "#26272A"
text_light = "#26272A"

[os]
format = "[оӮ¶](fg:os)[$symbol ]($style)"
style = "bg:os fg:text_color"
disabled=false

[username]
style_user = 'os'
style_root = 'os_admin'
#format = '[оӮ¶]($style)[у°Ҡ¬ mii](bg:$style fg:text_color)[оӮҙ]($style)'
format = '[$user](bg:$style fg:text_color)[оӮҙ]($style)'
disabled = false
show_always = true

[character]
success_symbol = "[у°Қҹ](fg:arrow)"
error_symbol = "[у°Қҹ](fg:red)"

[directory]
format = " [оӮ¶](fg:directory)[пҒј  $path]($style)[$read_only]($read_only_style)[оӮҙ](fg:directory)"
truncation_length = 2
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only =" о©ө "

[time]
disabled = true
format = " [оӮ¶](fg:time)[пҖ— $time]($style)[оӮҙ](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

[cmd_duration]
format = " [оӮ¶](fg:duration)[пү” $duration]($style)[оӮҙ](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

[git_branch]
format = " [оӮ¶](fg:git)[$symbol$branch](fg:text_light bg:git)[оӮҙ](fg:git)"
symbol = "пҗҳ "

[git_status]
format = '([ оӮ¶](fg:git_status)[ $all_status$ahead_behind ]($style)[оӮҙ](fg:git_status))'
style = "fg:text_light bg:git_status"

[docker_context]
disabled=true
symbol = "пҢҲ "

[package]
disabled=true

[java]
format = "[ оӮ¶](fg:java)[$symbol$version](bg:java fg:text_color)[оӮҙ](fg:java)"
version_format = "${raw}"
symbol = "оү– "
disabled = true

[nodejs]
format = "[ оӮ¶](fg:node)[$symbol$version]($style)[оӮҙ](fg:node)"
style = "bg:node fg:text_light"
symbol = "оңҳ "
version_format = "${raw}"
disabled=false

[rust]
format = "[ оӮ¶](fg:rust)[$symbol$version](bg:rust fg:text_color)[оӮҙ](fg:rust)"
symbol = "оҡӢ "
version_format = "${raw}"
disabled=true

[python]
disabled=false
format = '[ оӮ¶](fg:python)[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\))]($style)[оӮҙ](fg:python)'
symbol = "оҳҶ "
version_format = "${raw}"
style = "fg:text_light bg:python"

[conda]
format = "[ оӮ¶](fg:conda)[$symbol$environment]($style)[оӮҙ](fg:conda)"
style = "bg:conda fg:text_color"
ignore_base = false
disabled=false
symbol = "п„Ң "

[c]
format = "[ оӮ¶](fg:clang)[$symbol($version(-$name) )](bg:clang fg:text_color)[оӮҙ](fg:clang)"
symbol = "оҳһ "
version_format = "${raw}"
disabled=true

